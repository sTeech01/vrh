<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="VRH Production OS — Система управления производством ООО «ВРХ Инжиниринг»">
  <title>VRH Production OS</title>

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Favicon -->
  <link rel="icon" href="img/Logo vhr.webp" type="image/webp">
</head>
<body>

<!-- ════════════════════════════════════════════════════════
     APP SHELL
     ════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- ── Sidebar (desktop) ──────────────────────────────── -->
  <aside id="sidebar">
    <!-- Logo -->
    <div class="sidebar-logo">
      <img src="img/Logo vhr.webp" alt="ВРХ Инжиниринг" class="sidebar-logo-img" onclick="navigate('dashboard')" style="cursor:pointer">
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <div class="sidebar-section">Навигация</div>

      <a class="nav-item" data-nav="dashboard" href="#dashboard">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/>
          <path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/>
        </svg>
        Обзор
      </a>

      <a class="nav-item" data-nav="projects" href="#projects">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
        </svg>
        Проекты
      </a>

      <a class="nav-item" data-nav="problems" href="#problems">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        Проблемы
        <span id="problems-badge" class="nav-badge" style="display:none">0</span>
      </a>

      <a class="nav-item" data-nav="ai" href="#ai">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"/>
        </svg>
        AI-помощник
      </a>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <button onclick="exportData()">
        <svg viewBox="0 0 16 16" fill="currentColor" width="18" height="18">
          <path d="M.5 9.9a.5.5 0 01.5.5v2.5a1 1 0 001 1h12a1 1 0 001-1v-2.5a.5.5 0 011 0v2.5a2 2 0 01-2 2H2a2 2 0 01-2-2v-2.5a.5.5 0 01.5-.5z"/>
          <path d="M7.646 11.854a.5.5 0 00.708 0l3-3a.5.5 0 00-.708-.708L8.5 10.293V1.5a.5.5 0 00-1 0v8.793L5.354 8.146a.5.5 0 10-.708.708l3 3z"/>
        </svg>
        Экспорт данных
      </button>
      <div class="deploy-badge"></div>
    </div>
  </aside>

  <!-- ── Main area ─────────────────────────────────────── -->
  <div class="main-wrap">

    <!-- Top bar -->
    <header id="topbar">
      <button id="topbar-menu-btn">
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/>
        </svg>
      </button>

      <div id="breadcrumb">
        <span class="bc-item">Обзор</span>
      </div>

      <div class="topbar-actions">
        <button class="topbar-btn" onclick="showNotifications()" title="Проблемы">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Scrollable content -->
    <div id="view">
      <div class="view-inner">
        <div id="content">
          <!-- Рендерится через JS -->
          <div style="text-align:center;padding:60px 20px;color:#A8A8A8">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="36" height="36" style="margin:0 auto 12px;display:block;opacity:0.4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75"/>
            </svg>
            <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em">Загрузка системы...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Mobile Bottom Navigation ──────────────────────────── -->
<nav id="mobile-nav">
  <button class="mobile-nav-item" data-nav="dashboard" onclick="navigate('dashboard')">
    <svg viewBox="0 0 20 20" fill="currentColor">
      <path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/>
      <path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/>
    </svg>
    Обзор
  </button>
  <button class="mobile-nav-item" data-nav="projects" onclick="navigate('projects')">
    <svg viewBox="0 0 20 20" fill="currentColor">
      <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
    </svg>
    Проекты
  </button>
  <button class="mobile-nav-item" data-nav="problems" onclick="navigate('problems')">
    <svg viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
    </svg>
    Проблемы
  </button>
  <button class="mobile-nav-item" data-nav="ai" onclick="navigate('ai')">
    <svg viewBox="0 0 20 20" fill="currentColor">
      <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"/>
    </svg>
    AI
  </button>
</nav>

<!-- ── Sidebar overlay (mobile) ──────────────────────────── -->
<div id="sidebar-overlay"></div>

<!-- ── Modal ─────────────────────────────────────────────── -->
<div id="modal-overlay">
  <div id="modal-box">
    <!-- Content injected by JS -->
  </div>
</div>

<!-- ── Toast ─────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── Scripts ───────────────────────────────────────────── -->
<script src="js/data.js"></script>
<script src="js/ai.js"></script>
<script src="js/app.js"></script>

</body>
</html>
