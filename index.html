<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="VRH Production OS — Система управления производством ООО «ВРХ Инжиниринг»">
  <title>VRH ERP — Корпоративная платформа</title>

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/platform.css">
  <link rel="stylesheet" href="css/crm.css">

  <!-- Favicon -->
  <link rel="icon" href="img/Logo vhr.webp" type="image/webp">
</head>
<body>

<!-- ════════════════════════════════════════════════════════
     APP SHELL
     ════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- ── Sidebar (desktop) ──────────────────────────────── -->
  <aside id="sidebar">
    <!-- Logo -->
    <div class="sidebar-logo">
      <img src="img/Logo vhr.webp" alt="ВРХ Инжиниринг" class="sidebar-logo-img" onclick="navigate('home')" style="cursor:pointer">
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <!-- Содержимое nav перерисовывается updatePlatformSidebar() (js/platform.js).
           Ниже — статические заглушки до первого рендера. -->
      <div class="sidebar-section">Навигация</div>

      <a class="nav-item" data-nav="home" href="#home">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path d="M3 3.5A1.5 1.5 0 014.5 2h3A1.5 1.5 0 019 3.5v3A1.5 1.5 0 017.5 8h-3A1.5 1.5 0 013 6.5v-3zM11 3.5A1.5 1.5 0 0112.5 2h3A1.5 1.5 0 0117 3.5v3A1.5 1.5 0 0115.5 8h-3A1.5 1.5 0 0111 6.5v-3zM3 11.5A1.5 1.5 0 014.5 10h3A1.5 1.5 0 019 11.5v3A1.5 1.5 0 017.5 16h-3A1.5 1.5 0 013 14.5v-3zM11 11.5a1.5 1.5 0 011.5-1.5h3a1.5 1.5 0 011.5 1.5v3a1.5 1.5 0 01-1.5 1.5h-3a1.5 1.5 0 01-1.5-1.5v-3z"/>
        </svg>
        Рабочий стол
      </a>

      <a class="nav-item" data-nav="crm" href="#crm">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"/>
        </svg>
        CRM
      </a>

      <a class="nav-item" data-nav="dashboard" href="#dashboard">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/>
          <path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/>
        </svg>
        Обзор
      </a>

      <a class="nav-item" data-nav="projects" href="#projects">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
        </svg>
        Проекты
      </a>

      <a class="nav-item" data-nav="problems" href="#problems">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        Проблемы
        <span id="problems-badge" class="nav-badge" style="display:none">0</span>
      </a>

      <a class="nav-item" data-nav="ai" href="#ai">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"/>
        </svg>
        AI-помощник
      </a>

      <a class="nav-item" data-nav="events" href="#events">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/>
        </svg>
        События
        <span id="events-badge" class="nav-badge" style="display:none">0</span>
      </a>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <button onclick="doLogout()" title="Выйти" style="margin-bottom:4px">
        <svg viewBox="0 0 16 16" fill="currentColor" width="18" height="18">
          <path fill-rule="evenodd" d="M10 12.5a.5.5 0 01-.5.5h-8a.5.5 0 01-.5-.5v-9a.5.5 0 01.5-.5h8a.5.5 0 01.5.5v2a.5.5 0 001 0v-2A1.5 1.5 0 009.5 2h-8A1.5 1.5 0 000 3.5v9A1.5 1.5 0 001.5 14h8a1.5 1.5 0 001.5-1.5v-2a.5.5 0 00-1 0v2z"/>
          <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 000-.708l-3-3a.5.5 0 10-.708.708L14.293 7.5H5.5a.5.5 0 000 1h8.793l-2.147 2.146a.5.5 0 00.708.708l3-3z"/>
        </svg>
        Выйти
      </button>
      <button onclick="exportData()">
        <svg viewBox="0 0 16 16" fill="currentColor" width="18" height="18">
          <path d="M.5 9.9a.5.5 0 01.5.5v2.5a1 1 0 001 1h12a1 1 0 001-1v-2.5a.5.5 0 011 0v2.5a2 2 0 01-2 2H2a2 2 0 01-2-2v-2.5a.5.5 0 01.5-.5z"/>
          <path d="M7.646 11.854a.5.5 0 00.708 0l3-3a.5.5 0 00-.708-.708L8.5 10.293V1.5a.5.5 0 00-1 0v8.793L5.354 8.146a.5.5 0 10-.708.708l3 3z"/>
        </svg>
        Экспорт данных
      </button>
      <div class="deploy-badge"></div>
    </div>
  </aside>

  <!-- ── Main area ─────────────────────────────────────── -->
  <div class="main-wrap">

    <!-- Top bar -->
    <header id="topbar">
      <button id="topbar-menu-btn">
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/>
        </svg>
      </button>

      <div id="breadcrumb">
        <span class="bc-item">Обзор</span>
      </div>

      <div class="topbar-actions">
        <button class="topbar-btn" onclick="showNotifications()" title="Проблемы">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Scrollable content -->
    <div id="view">
      <div class="view-inner">
        <div id="content">
          <!-- Рендерится через JS -->
          <div style="text-align:center;padding:60px 20px;color:#A8A8A8">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="36" height="36" style="margin:0 auto 12px;display:block;opacity:0.4">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75"/>
            </svg>
            <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em">Загрузка системы...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Mobile Bottom Navigation ──────────────────────────── -->
<nav id="mobile-nav">
  <button class="mobile-nav-item" data-nav="dashboard" onclick="navigate('dashboard')">
    <svg viewBox="0 0 20 20" fill="currentColor">
      <path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/>
      <path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/>
    </svg>
    Обзор
  </button>
  <button class="mobile-nav-item" data-nav="projects" onclick="navigate('projects')">
    <svg viewBox="0 0 20 20" fill="currentColor">
      <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
    </svg>
    Проекты
  </button>
  <button class="mobile-nav-item" data-nav="problems" onclick="navigate('problems')">
    <svg viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
    </svg>
    Проблемы
  </button>
  <button class="mobile-nav-item" data-nav="ai" onclick="navigate('ai')">
    <svg viewBox="0 0 20 20" fill="currentColor">
      <path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"/>
    </svg>
    AI
  </button>
</nav>

<!-- ── Sidebar overlay (mobile) ──────────────────────────── -->
<div id="sidebar-overlay"></div>

<!-- ── Splash Screen ──────────────────────────────────────── -->
<div id="splash-screen">
  <div class="splash-inner">
    <img src="img/Logo vhr.webp" alt="ВРХ Инжиниринг" class="splash-logo">

    <div class="splash-steps">
      <div class="splash-step splash-step-active" id="splash-step-0">
        <div class="splash-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C8 2 4 6.5 4 10.5c0 5.5 8 11.5 8 11.5s8-6 8-11.5C20 6.5 16 2 12 2z"/>
            <circle cx="12" cy="10" r="2.5"/>
          </svg>
        </div>
        <span class="splash-step-label">Вода</span>
      </div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
      <div class="splash-step" id="splash-step-1">
        <div class="splash-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/>
          </svg>
        </div>
        <span class="splash-step-label">Рециркуляция</span>
      </div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
      <div class="splash-step" id="splash-step-2">
        <div class="splash-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>
          </svg>
        </div>
        <span class="splash-step-label">Рыба</span>
      </div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
      <div class="splash-step" id="splash-step-3">
        <div class="splash-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.07 4.93l-1.41 1.41M6.34 17.66l-1.41 1.41M2 12h2M20 12h2M19.07 19.07l-1.41-1.41M6.34 6.34L4.93 4.93M12 2v2M12 20v2"/>
          </svg>
        </div>
        <span class="splash-step-label">Автоматизация</span>
      </div>
    </div>

    <div class="splash-progress-wrap">
      <div class="splash-progress-header">
        <span class="splash-title">Загрузка данных</span>
        <span class="splash-pct" id="splash-pct">0%</span>
      </div>
      <div class="splash-track">
        <div class="splash-fill" id="splash-fill"></div>
      </div>
    </div>

    <p class="splash-tagline">Проектирование&nbsp;&nbsp;•&nbsp;&nbsp;Рециркуляция&nbsp;&nbsp;•&nbsp;&nbsp;Выращивание&nbsp;&nbsp;•&nbsp;&nbsp;Автоматизация</p>
  </div>
</div>

<!-- ── Login Screen ───────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <img src="img/Logo vhr.webp" alt="ВРХ Инжиниринг" class="login-logo">
    <div class="login-title">VRH ERP</div>
    <div class="login-subtitle">Введите данные для входа</div>
    <input id="login-email" class="login-input" type="email" placeholder="Email" autocomplete="email">
    <input id="login-password" class="login-input" type="password" placeholder="Пароль" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') doLogin()">
    <div id="login-error" class="login-error"></div>
    <button id="login-btn" class="login-btn" onclick="doLogin()">Войти</button>
  </div>
</div>

<!-- ── Modal ─────────────────────────────────────────────── -->
<div id="modal-overlay">
  <div id="modal-box">
    <!-- Content injected by JS -->
  </div>
</div>

<!-- ── Toast ─────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── Scripts ───────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/data.js"></script>
<script src="js/ai.js"></script>
<script src="js/platform.js"></script>
<script src="js/crm.js"></script>
<script src="js/app.js"></script>

</body>
</html>
